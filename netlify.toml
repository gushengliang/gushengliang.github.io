[build]
  publish = "public"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# 域名重定向
[[redirects]]
  from = "https://lvjie.eu.org/*"
  to = "https://www.lvjie.eu.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://lvjie.eu.org/*"
  to = "https://www.lvjie.eu.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.lvjie.eu.org/*"
  to = "https://www.lvjie.eu.org/:splat"
  status = 301
  force = true

# 安全头部
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 缓存配置
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA回退
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Status = 404 }